agentspec: "0.1"
id: feat-email-password-login
title: Email/password user login
intent: |
  Allow returning users to authenticate using email and password and receive a
  session token for subsequent API calls. Must hold under 100 concurrent
  logins per second.
actors:
  - returning user
  - auth backend
  - session store
contracts:
  - name: POST /auth/login
    inputs:
      - key: email
        val: "string (RFC 5322)"
      - key: password
        val: "string (8-128 chars)"
    outputs:
      - key: token
        val: "string (JWT, RS256)"
      - key: expires_at
        val: "ISO 8601 timestamp"
    errors:
      - INVALID_CREDENTIALS
      - ACCOUNT_LOCKED
      - RATE_LIMITED
      - VALIDATION_ERROR
invariants:
  - Passwords are never returned in any response
  - Failed-login attempts are rate-limited to 5 per minute per IP
  - Sessions expire after 24 hours
  - All auth events emit an audit log entry within 50ms
acceptance:
  - given: a registered user with valid email and password
    when: they POST /auth/login with correct credentials
    then: response is 200 with a JWT and expires_at within 24 hours
  - given: a registered user with valid email but wrong password
    when: they POST /auth/login
    then: response is 401 with code INVALID_CREDENTIALS and no token
  - given: any IP that has already failed 5 login attempts in the last 60 seconds
    when: that IP POSTs /auth/login again
    then: response is 429 with code RATE_LIMITED and Retry-After header
context:
  files:
    - src/auth/session.ts
    - src/db/users.ts
    - src/middleware/rate-limit.ts
  symbols:
    - User.findByEmail
    - Session.create
    - RateLimiter.check
constraints:
  performance.p99: "< 100ms"
  security.password_hash: "bcrypt cost >= 12, constant-time compare"
  dependencies: "no new packages without ADR approval"
out_of_scope:
  - OAuth and SSO flows (separate spec)
  - Password reset (separate spec)
  - Account creation (separate spec)
  - MFA enrollment (separate spec)
